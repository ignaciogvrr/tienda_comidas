apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-comidas-backend
  namespace: tienda-comidas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tienda-comidas-backend
  template:
    metadata:
      labels:
        app: tienda-comidas-backend
    spec:
      containers:
        - name: backend
          image: 542081623405.dkr.ecr.us-east-1.amazonaws.com/tienda-comidas-backend:eks-v1 # Colocar uri de tu imagen en ECR
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOST
              value: "tienda-comidas-db"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: DB_NAME
              value: "tienda_perritos"
            - name: DB_PORT
              value: "3306"

          # Se agrega Resource para que Metrics Server calcule el % de CPU y Memoria para escalar
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # HEALTH CHECKS (PROBES)
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
